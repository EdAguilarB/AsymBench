dataset:
  path: data/hydrogenation/Sunoj_PNAS.csv
  smiles_columns: [ligand, substrate, solvent]
  target: ddG
  id_col: name
  reaction_features:                     # optional: numeric columns to append to
    - T                        # molecular features before normalisation

representations:

  # graph representation
  - type: graph
    params:
      include_hydrogens: false

  # molecular descriptors
  # - type: circus
  #   params:
  #     radius: 2
  #   name: Circus_2
  # - type: morgan
  #   params:
  #     radius: 2
  #     n_bits: 2048
  #   name: Morgan_2048
  - type: morgan
    params:
      radius: 2
      n_bits: 1024
    name: Morgan_1024
  - type: rdkit
    name: RDKit

  # embedding-based
  # - type: unimol
  #   params:
  #     model_name: unimolv1
  #     data_type: molecule
  #     remove_hs: false
  #   name: UniMol

  - type: hf_transformer
    params:
      model_type: chemberta
      model_name: DeepChem/ChemBERTa-77M-MLM
      pooling: mean
      device: cpu
    name: ChemBertA_77M-MLM

  # - type: hf_transformer
  #   params:
  #     model_type: molt5
  #   name: MolT5

  # bespoke
  - type: bespoke
    params:
      features_path: data/hydrogenation/features.csv
      feature_name: all
      index_col: name
      strict: true


preprocessing:
  scaling: minmax

  feature_selection:
    variance_filter:
      enabled: true
      threshold: 0.0

    correlation_filter:
      enabled: true
      threshold: 0.95
      method: pearson

target_scaling:
  scaling: minmax

models:
  - type: gnn
    params:
      architecture: gin
      activation: leaky_relu      # relu | leaky_relu | elu | silu | gelu | tanh

      # --- shared ---
      hidden_dim: 64
      num_layers: 2           # GIN often benefits from more layers
      pooling: mean_max       # concatenate mean+max — common for GIN
      readout_layers: 2
      dropout: 0.0

      # --- GIN-specific ---
      train_eps: false        # if true, epsilon is a learned parameter
                              # per layer instead of fixed at 0 [default: false]
      edge_in_dim: 8          # bond feature dimension            [default: EDGE_FEAT_DIM=8]

      # --- training ---
      epochs: 100
      lr: 0.001
      batch_size: 32

  - type: random_forest
    hpo:
      enabled: true
      n_trials: 50
      cv: 3
      scoring: rmse
      search_space:
        n_estimators: {type: int, low: 100, high: 1200}
        max_depth: {type: int, low: 3, high: 30}
        min_samples_leaf: {type: int, low: 1, high: 10}
  - type: svr
    hpo:
      enabled: true
      n_trials: 50
      cv: 3
      scoring: rmse
      search_space:
        C: {type: float, low: 1e-2, high: 1e3, log: true}
        gamma: {type: float, low: 1e-6, high: 1e0, log: true}
        epsilon: {type: float, low: 1e-3, high: 1.0, log: true}
  - type: xgb
    hpo:
      enabled: true
      n_trials: 50
      cv: 3
      scoring: rmse
      search_space:
        n_estimators: {type: int, low: 200, high: 1500}
        max_depth: {type: int, low: 3, high: 10}
        learning_rate: {type: float, low: 0.01, high: 0.3, log: true}
        subsample: {type: float, low: 0.5, high: 1.0}
        colsample_bytree: {type: float, low: 0.5, high: 1.0}
        min_child_weight: {type: float, low: 1.0, high: 10.0}
        reg_alpha: {type: float, low: 1e-8, high: 10.0, log: true}
        reg_lambda: {type: float, low: 1e-3, high: 10.0, log: true}
  - type: mlp
    hpo:
      enabled: true
      n_trials: 50
      cv: 3
      scoring: rmse
      search_space:
        hidden_layer_sizes:
          type: categorical
          choices:
            - [16]
            - [32]
            - [64]
            - [16, 16]
            - [32, 16]
            - [32, 32]
            - [64, 32]
        activation:
          type: categorical
          choices: [relu]
        alpha:
          type: float
          low: 1e-6
          high: 1e-1
          log: true
        learning_rate_init:
          type: float
          low: 1e-4
          high: 1e-2
          log: true
        batch_size:
          type: categorical
          choices: [32, 64, 128]

splits:
  - sampler: scaffold

split_by_mol_col: [substrate]

train_set_sizes: [0.8]

seeds: [0, 1, 2, 3, 4]

# Explainability is disabled by default because it is computationally expensive.
# Set enabled: true to activate.
#
#   Traditional ML (SHAP):
#     max_background  – background samples for KernelExplainer (default 200)
#     max_explain     – samples to compute SHAP values for (default 500)
#
#   GNN (Integrated Gradients, signed — no captum required):
#     n_steps      – Riemann-sum steps for IG approximation (default 50;
#                    use ≥ 100 for publication-quality results)
#     fragmentation – brics | murcko_scaffold (default brics)
explainability:
  enabled: false
  max_background: 200
  max_explain: 500
  n_steps: 50
  fragmentation: brics

log_dirs:
  runs: experiments/hydrogenation/runs
  benchmark: experiments/hydrogenation/benchmark
