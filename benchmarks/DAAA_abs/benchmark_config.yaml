dataset:
  path: data/DAAA_abs/DAAA.csv
  smiles_columns: [substrate_smiles, ligand_smiles, solvent_smiles]
  target: ddG_abs
  id_col: Example
  reaction_features:                     # optional: numeric columns to append to
    - temp

representations:

  # graph representation
  - type: graph
    params:
      include_hydrogens: false

  # molecular descriptors
  - type: circus
    params:
      radius: 2
    name: Circus_2
  - type: morgan
    params:
      radius: 2
      n_bits: 2048
    name: Morgan_2048
  - type: morgan
    params:
      radius: 2
      n_bits: 1024
    name: Morgan_1024
  - type: rdkit
    name: RDKit

  # embedding-based
  - type: unimol
    params:
      model_name: unimolv1
      data_type: molecule
      remove_hs: false
    name: UniMol
  - type: hf_transformer
    params:
      model_type: chemberta
      model_name: DeepChem/ChemBERTa-77M-MLM
      pooling: mean
      device: cpu
    name: ChemBertA_77M-MLM
  - type: hf_transformer
    params:
      model_type: molt5
    name: MolT5

  # bespoke descriptors
  - type: bespoke
    params:
      features_path: data/DAAA_abs/features_simple.csv
      feature_name: v1
      index_col: Example
      feature_columns: ['A(stout)', 'A(Hammett)',
             'B(volume)', 'B(Hammett)', 'C(volume)', 'C(Hammett)', 'D(volume)', 'D(Hammett)',
             'R(volume)', 'ANDEN', 'dielectric constant']
      prefix: bespoke
      strict: true
      name: V1

  - type: bespoke
    params:
      features_path: data/DAAA_abs/features_simple.csv
      feature_name: v2
      index_col: Example
      feature_columns: ['A(stout)', 'A(Hammett sum)',
             'B(volume)', 'B(Hammett)', 'C(volume)', 'C(Hammett)', 'D(volume)', 'D(Hammett)',
             'R(volume)','ANDEN', 'dielectric constant']
      prefix: bespoke
      strict: true
      name: V2

  - type: bespoke
    params:
      features_path: data/DAAA_abs/features_simple.csv
      feature_name: v3
      index_col: Example
      feature_columns: ['A(stout)', 'A(Hammett avg.)',
             'B(volume)', 'B(Hammett)', 'C(volume)', 'C(Hammett)', 'D(volume)', 'D(Hammett)',
             'R(volume)', 'ANDEN', 'dielectric constant']
      prefix: bespoke
      strict: true
      name: V3

  - type: bespoke
    params:
      features_path: data/DAAA_abs/features_simple.csv
      feature_name: v4
      index_col: Example
      feature_columns: ['A(stout)', 'A(C-NMR-ipso-shifts)',
             'B(volume)', 'B(Hammett)', 'C(volume)', 'C(Hammett)', 'D(volume)', 'D(Hammett)',
             'R(volume)', 'ANDEN', 'dielectric constant']
      prefix: bespoke
      strict: true
      name: V4

preprocessing:
  scaling: minmax

  feature_selection:
    variance_filter:
      enabled: true
      threshold: 0.0

    correlation_filter:
      enabled: true
      threshold: 0.95
      method: pearson

target_scaling:
  scaling: minmax

models:
  # GNN
  - type: gnn
    params:
      architecture: gcn       # "gcn" | "gat" | "gin"  [default: gcn]

      # --- shared (all architectures) ---
      hidden_dim: 64          # width of conv & readout layers   [default: 64]
      num_layers: 2           # number of convolutional layers   [default: 3]
      pooling: mean_max           # mean | add | max | mean_max      [default: mean]
                              #   mean_max concatenates mean+max pooling,
                              #   doubling the embedding fed to the readout
      readout_layers: 2       # MLP depth incl. output layer     [default: 2]
                              #   2 → hidden → hidden//2 → 1
                              #   3 → hidden → hidden//2 → hidden//4 → 1
      dropout: 0.0            # dropout after each conv+readout  [default: 0.0]

      # --- GCN-specific ---
      improved: true         # if true, self-loop weight = 2    [default: false]
                              # (improved normalisation from Kipf & Welling)

      # --- training (not forwarded to the model constructor) ---
      epochs: 100             # training epochs                  [default: 100]
      lr: 0.001               # Adam learning rate               [default: 0.001]
      batch_size: 32          # graphs per mini-batch            [default: 32]
      num_workers: 4

  - type: gnn
    params:
      architecture: gin
      activation: leaky_relu      # relu | leaky_relu | elu | silu | gelu | tanh

      # --- shared ---
      hidden_dim: 64
      num_layers: 2           # GIN often benefits from more layers
      pooling: mean_max       # concatenate mean+max — common for GIN
      readout_layers: 2
      dropout: 0.0

      # --- GIN-specific ---
      train_eps: false        # if true, epsilon is a learned parameter
                              # per layer instead of fixed at 0 [default: false]
      edge_in_dim: 8          # bond feature dimension            [default: EDGE_FEAT_DIM=8]

      # --- training ---
      epochs: 100
      lr: 0.001
      batch_size: 32
      num_workers: 4

  - type: gnn
    params:
      architecture: gat

      # --- shared ---
      hidden_dim: 64
      num_layers: 2
      pooling: mean_max           # mean | add | max | mean_max
      readout_layers: 2
      dropout: 0.0            # also applied inside attention layers

      # --- GAT-specific ---
      num_heads: 2            # attention heads per layer         [default: 4]
                              # heads are averaged (concat=False),
                              # so output width stays hidden_dim
      edge_in_dim: 8          # bond feature dimension            [default: EDGE_FEAT_DIM=8]
                              # only change if you customise the featurizer

      # --- training ---
      epochs: 100
      lr: 0.001
      batch_size: 32
      num_workers: 4

  #TML
  - type: random_forest
    hpo:
      enabled: true
      n_trials: 50
      cv: 3
      scoring: rmse
      search_space:
        n_estimators: {type: int, low: 100, high: 1200}
        max_depth: {type: int, low: 3, high: 30}
        min_samples_leaf: {type: int, low: 1, high: 10}
  - type: svr
    hpo:
      enabled: true
      n_trials: 50
      cv: 3
      scoring: rmse
      search_space:
        C: {type: float, low: 1e-2, high: 1e3, log: true}
        gamma: {type: float, low: 1e-6, high: 1e0, log: true}
        epsilon: {type: float, low: 1e-3, high: 1.0, log: true}
  - type: xgb
    hpo:
      enabled: true
      n_trials: 50
      cv: 3
      scoring: rmse
      search_space:
        n_estimators: {type: int, low: 200, high: 1500}
        max_depth: {type: int, low: 3, high: 10}
        learning_rate: {type: float, low: 0.01, high: 0.3, log: true}
        subsample: {type: float, low: 0.5, high: 1.0}
        colsample_bytree: {type: float, low: 0.5, high: 1.0}
        min_child_weight: {type: float, low: 1.0, high: 10.0}
        reg_alpha: {type: float, low: 1e-8, high: 10.0, log: true}
        reg_lambda: {type: float, low: 1e-3, high: 10.0, log: true}
  - type: mlp
    hpo:
      enabled: true
      n_trials: 50
      cv: 3
      scoring: rmse
      search_space:
        hidden_layer_sizes:
          type: categorical
          choices:
            - [16]
            - [32]
            - [64]
            - [16, 16]
            - [32, 16]
            - [32, 32]
            - [64, 32]
        activation:
          type: categorical
          choices: [relu]
        alpha:
          type: float
          low: 1e-6
          high: 1e-1
          log: true
        learning_rate_init:
          type: float
          low: 1e-4
          high: 1e-2
          log: true
        batch_size:
          type: categorical
          choices: [32, 64, 128]

splits:
  - sampler: random
  - sampler: scaffold
  - sampler: target_property

split_by_mol_col: [substrate_smiles]

train_set_sizes: [0.8, 0.6, 0.4]

seeds: [0, 1, 2, 3, 4]

# Explainability is disabled by default because it is computationally expensive.
# Set enabled: true to activate.
#
#   Traditional ML (SHAP):
#     max_background  – background samples for KernelExplainer (default 200)
#     max_explain     – samples to compute SHAP values for (default 500)
#
#   GNN (Integrated Gradients, signed — no captum required):
#     n_steps      – Riemann-sum steps for IG approximation (default 50;
#                    use ≥ 100 for publication-quality results)
#     fragmentation – brics | murcko_scaffold (default brics)
explainability:
  enabled: false
  max_background: 200
  max_explain: 500
  n_steps: 50
  fragmentation: brics

log_dirs:
  runs: experiments/DAAA_abs/internal_test_set/runs
  benchmark: experiments/DAAA_abs/internal_test_set/benchmark
